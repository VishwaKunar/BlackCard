steps:

# ✅ 1. Build Docker Image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA'
    - '.'

# ✅ 2. Push Docker Image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA'

# ✅ 3. Deploy to VM (NO SSH → FIXED METHOD ✅)
- name: 'gcr.io/cloud-builders/gcloud'
  args:
    - 'compute'
    - 'instances'
    - 'add-metadata'
    - 'vm001'
    - '--zone=us-central1-a'
    - '--metadata'
    - startup-script=sudo docker stop app || true; sudo docker rm app || true; sudo docker pull us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA; sudo docker run -d -p 80:8080 --name app us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA

# ✅ Track built image
images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA'

# ✅ Logging option
options:
  logging: CLOUD_LOGGING_ONLY
