steps:

# ✅ 1. Build Docker Image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA'
    - '.'

# ✅ 2. Push Docker Image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA'

# ✅ 3. Deploy to Compute Engine VM (CD Step)
- name: 'gcr.io/cloud-builders/gcloud'
  args:
    - 'compute'
    - 'ssh'
    - 'vm001'
    - '--zone=us-central1-a'
    - '--command'
    - |
      echo "Stopping old container..."
      docker stop app || true
      docker rm app || true

      echo "Pulling new image..."
      docker pull us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA

      echo "Running new container..."
      docker run -d --name app -p 80:8080 \
      us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA

# ✅ Track built image
images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/app:$SHORT_SHA'

# ✅ Logging option
options:
  logging: CLOUD_LOGGING_ONLY
